<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Appointment Slip</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter','Noto Sans Bengali',sans-serif;background-color:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}.slip-container{width:380px;background:#fff;border:2px solid #000;padding:0;box-sizing:border-box;letter-spacing:-.2px}.slip-header{display:flex;align-items:center;justify-content:center;border-bottom:2px solid #000;padding:5px;position:relative}.slip-header .calendar-icon{font-size:14px;margin-right:6px;display:flex;align-items:center}.slip-header h2{font-size:16px;font-weight:700;color:#000;white-space:nowrap}.branch-section{padding:5px 8px;position:relative;font-size:11px;line-height:1.25;color:#000}.branch-section .date-top{position:absolute;top:5px;right:8px;font-weight:700;white-space:nowrap}.branch-section h3{font-size:13px;font-weight:700;margin-bottom:1px}.branch-section h4{font-size:12px;font-weight:700;margin-bottom:1px}.data-table{width:100%;border-collapse:collapse;margin-top:1px}.data-table td{border:1px solid #ccc;border-left:none;border-right:none;padding:3px 6px;font-size:11.5px;color:#000;vertical-align:middle;line-height:1.2;white-space:nowrap}.data-table td:first-child{width:28%;font-weight:700;border-right:1px solid #ccc}.data-table td:last-child{font-weight:600}.slip-footer{text-align:center;border-top:2px solid #000;font-size:10.5px;color:#000;display:flex;justify-content:space-between;align-items:center;padding:4px 8px}.slip-footer .id-label{color:#64748b;font-size:10.5px;font-weight:600;text-transform:uppercase}.slip-footer .id-value{font-size:13px;font-weight:700;color:#0369a1;letter-spacing:.5px}</style></head><body><div class="slip-container" id="capture-slip"><div class="slip-header"><div class="calendar-icon">📅</div><h2>Appointment Slip</h2></div><div class="branch-section"><div class="date-top">Date: <span id="slip-date"></span></div><h3 id="centre-name"></h3><h4 id="centre-type"></h4><div>(<span id="branch-name"></span>)</div><div id="branch-address"></div><div>Phone: <span id="branch-phone"></span></div></div><table class="data-table"><tr><td>নাম (Name)</td><td id="p-name"></td></tr><tr><td>ফোন (Phone)</td><td id="p-phone"></td></tr><tr><td>বয়স / লিঙ্গ</td><td><span id="p-age"></span> / <span id="p-gender"></span></td></tr><tr><td>ঠিকানা</td><td id="p-address"></td></tr><tr><td>শিডিউল</td><td id="p-schedule"></td></tr></table><div class="slip-footer"><div class="id-label">Patient ID</div><div class="id-value" id="p-id"></div></div></div><script>window.onload=function(){const e=new URLSearchParams(window.location.search);document.getElementById("slip-date").innerText=e.get("date")||"",document.getElementById("centre-name").innerText=e.get("centre")||"",document.getElementById("centre-type").innerText=e.get("type")||"",document.getElementById("branch-name").innerText=e.get("branch")||"",document.getElementById("branch-address").innerText=e.get("address")||"",document.getElementById("branch-phone").innerText=e.get("phone")||"",document.getElementById("p-name").innerText=e.get("name")||"",document.getElementById("p-phone").innerText=e.get("p_phone")||"",document.getElementById("p-age").innerText=e.get("age")||"",document.getElementById("p-gender").innerText=e.get("gender")||"",document.getElementById("p-address").innerText=e.get("p_address")||"",document.getElementById("p-schedule").innerText=e.get("schedule")||"",document.getElementById("p-id").innerText=e.get("id")||"";const n=e.get("filename")||"appointment.png";setTimeout((()=>{html2canvas(document.getElementById("capture-slip"),{useCORS:!0,scale:3}).then((e=>{const t=document.createElement("a");t.href=e.toDataURL("image/png"),t.download=n,t.click()}))}),800)};</script></body></html>
